<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessa & Jun Rhey Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f1f4f0; font-family: 'Lato', sans-serif; color: #2d4f3c; text-align: center; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .invite-img { width: 100%; display: block; margin-bottom: 0; }
        .content { padding: 40px 20px; background: white; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 10px; color: #045c3c; }
        .rsvp-section { position: sticky; bottom: 20px; z-index: 100; padding: 10px; }
        .rsvp-btn { display: inline-block; background-color: #045c3c; color: white; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .rsvp-btn:hover { background-color: #067a4f; transform: scale(1.05); }
        .hashtag { font-weight: bold; color: #045c3c; margin: 20px 0; font-size: 1.1rem; }
        .footer { padding: 40px; font-size: 0.8rem; color: #889a8e; background: #f9f9f9; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="container">
